  <rect width="512" height="512" rx="138" fill="#7C6FE0"/>
  <g transform="translate(86 86) scale(6.54)">
    <path d="M 16 9 L 16 30 A 10 10 0 0 0 36 30 L 36 22"
          fill="none" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>
    <circle cx="36" cy="12.5" r="4.5" fill="#D4920E"/>
  </g>
</svg>
